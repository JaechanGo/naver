<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>아이콘을 생성하려면 이 파일을 브라우저에서 열고 각 이미지를 우클릭 → 저장하세요.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#FF6F00';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.5}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✍', size / 2, size / 2);
  const img = new Image();
  img.src = c.toDataURL('image/png');
  img.style.display = 'block';
  img.style.margin = '10px';
  img.alt = `icon${size}.png`;
  document.body.appendChild(img);
}
draw('c16', 16);
draw('c48', 48);
draw('c128', 128);
</script>
</body>
</html>
